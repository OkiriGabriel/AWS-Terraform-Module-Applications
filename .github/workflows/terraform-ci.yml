name: Terraform Validation

on:
  pull_request:
    branches: 
      - main
      - development
      - staging
  push:
    branches: 
      - main
      - development
      - staging

permissions:
  contents: read
  pull-requests: write  # Allow commenting on PRs

jobs:
  validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.9  # Use latest 1.9.x version

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Check for Secrets
        run: |
          echo "Checking for potential secrets in code..."
          if grep -rE '(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|password\s*=\s*["\047])' --include='*.tf' --exclude-dir='.terraform' .; then
            echo "⚠️ WARNING: Potential secrets found in Terraform files!"
            echo "Please remove hardcoded secrets and use Secrets Manager or variables."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Validate Module Structure
        run: |
          echo "Validating module structure..."
          
          # Check that each module directory has required files
          for module_dir in eks guardduty inspector vpc_peering vpn transit_gateway vpc alb rds; do
            if [ -d "$module_dir" ]; then
              if [ ! -f "$module_dir/main.tf" ]; then
                echo "❌ Missing main.tf in $module_dir"
                exit 1
              fi
              if [ ! -f "$module_dir/variables.tf" ]; then
                echo "❌ Missing variables.tf in $module_dir"
                exit 1
              fi
              if [ ! -f "$module_dir/outputs.tf" ]; then
                echo "❌ Missing outputs.tf in $module_dir"
                exit 1
              fi
              echo "✅ $module_dir module structure is valid"
            fi
          done

      - name: Validate Terraform Syntax
        run: |
          echo "Running additional syntax checks..."
          
          # Check for common issues
          if grep -r 'terraform_remote_state' --include='*.tf' . 2>/dev/null; then
            echo "ℹ️ Found terraform_remote_state usage - ensure backend is properly configured"
          fi
          
          echo "✅ Syntax validation complete"

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true  # Don't fail the build, just report
          
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true  # Don't fail the build, just report
          output_format: cli
